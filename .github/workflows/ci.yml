name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome (for puppeteer-core + Lighthouse)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          nohup npm run start > server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 >/dev/null && { echo "server up"; exit 0; }
            sleep 2
          done
          echo "::error::server did not start"; cat server.log; exit 1

      - name: E2E tests (overflow + a11y)
        run: npm test
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          BASE_URL: http://localhost:3000

      - name: Lighthouse CI (perf/a11y/best-practices/SEO budgets)
        run: npx lhci autorun
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
